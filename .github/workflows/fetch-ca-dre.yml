name: Package official California DRE data

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload normalized official California data
        uses: actions/upload-artifact@v4
        with:
          name: california-dre-agents
          path: |
            california_real_estate_agents.csv
            california_profile.json
            source_sha256.txt
          retention-days: 1
          compression-level: 6
