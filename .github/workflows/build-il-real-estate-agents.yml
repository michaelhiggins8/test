name: Build IL real estate agents CSV

on:
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/build-il-real-estate-agents.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download and normalize official Illinois license data
        shell: bash
        run: |
          cat > /tmp/build_il.py <<'PY'
          import csv
          import hashlib
          import json
          import re
          import time
          import unicodedata
          import urllib.parse
          import urllib.request
          from collections import Counter
          from datetime import datetime, timezone
          from pathlib import Path

          DATASET_ID = "pzzh-kp68"
          DOMAIN = "data.illinois.gov"
          SOURCE_PAGE = f"https://{DOMAIN}/d/{DATASET_ID}"
          API = f"https://{DOMAIN}/resource/{DATASET_ID}.json"
          TARGET_CODES = {
              "471": "Licensed Real Estate Managing Broker",
              "472": "Residential Leasing Agent Permit",
              "473": "Licensed Real Estate Residential Leasing Agent",
              "475": "Licensed Real Estate Broker",
          }
          MAY_1_2026_ACTIVE_COUNTS = {
              "471": 13593,
              "472": 155,
              "473": 2700,
              "475": 52151,
          }
          FIELDS = ["name", "state", "image_url", "license_number"]

          def clean(value):
              value = "" if value is None else str(value)
              value = unicodedata.normalize("NFKC", value)
              return re.sub(r"\s+", " ", value).strip()

          def date_key(value):
              value = clean(value)
              if not value:
                  return 0.0
              candidates = [value, value.replace("Z", "+00:00")]
              for candidate in candidates:
                  try:
                      dt = datetime.fromisoformat(candidate)
                      if dt.tzinfo is None:
                          dt = dt.replace(tzinfo=timezone.utc)
                      return dt.timestamp()
                  except ValueError:
                      pass
              for fmt in ("%m/%d/%Y", "%m/%d/%Y %H:%M:%S", "%Y-%m-%d"):
                  try:
                      return datetime.strptime(value, fmt).replace(tzinfo=timezone.utc).timestamp()
                  except ValueError:
                      pass
              return 0.0

          def fetch_page(offset, limit=50000):
              params = {
                  "$select": (
                      "description,license_number,license_status,business,"
                      "first_name,middle,last_name,prefix,suffix,"
                      "original_issue_date,effective_date,expiration_date,lastmodifieddate"
                  ),
                  "$where": (
                      "license_type = 'REAL ESTATE' AND "
                      "license_status = 'ACTIVE' AND business = 'N'"
                  ),
                  "$order": "license_number ASC, :id ASC",
                  "$limit": str(limit),
                  "$offset": str(offset),
              }
              url = API + "?" + urllib.parse.urlencode(params)
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "OfficialRealEstateLicenseCollector/1.0",
                      "Accept": "application/json",
                  },
              )
              last_error = None
              for attempt in range(6):
                  try:
                      with urllib.request.urlopen(request, timeout=180) as response:
                          return json.load(response)
                  except Exception as exc:
                      last_error = exc
                      if attempt == 5:
                          raise
                      time.sleep(2 ** attempt)
              raise last_error

          records = {}
          conflicts = []
          raw_rows = 0
          duplicate_rows = 0
          invalid_license_rows = 0
          blank_name_rows = 0
          excluded_code_counts = Counter()
          raw_description_counts = Counter()
          offset = 0
          page_size = 50000

          while True:
              page = fetch_page(offset, page_size)
              if not isinstance(page, list):
                  raise RuntimeError(f"Unexpected API response type: {type(page).__name__}")
              if not page:
                  break
              raw_rows += len(page)
              for row in page:
                  description = clean(row.get("description"))
                  raw_description_counts[description] += 1
                  license_number = clean(row.get("license_number"))
                  if not re.fullmatch(r"\d{9}", license_number):
                      invalid_license_rows += 1
                      continue
                  code = license_number[:3]
                  if code not in TARGET_CODES:
                      excluded_code_counts[code] += 1
                      continue

                  name = clean(" ".join(filter(None, [
                      clean(row.get("first_name")),
                      clean(row.get("middle")),
                      clean(row.get("last_name")),
                      clean(row.get("suffix")),
                  ])))
                  if not name:
                      blank_name_rows += 1
                      continue

                  candidate = {
                      "name": name,
                      "state": "IL",
                      "image_url": "",
                      "license_number": license_number,
                      "code": code,
                      "description": description,
                      "lastmodifieddate": clean(row.get("lastmodifieddate")),
                      "expiration_date": clean(row.get("expiration_date")),
                      "effective_date": clean(row.get("effective_date")),
                  }
                  candidate_key = (
                      date_key(candidate["lastmodifieddate"]),
                      date_key(candidate["expiration_date"]),
                      date_key(candidate["effective_date"]),
                      len(candidate["name"]),
                      candidate["name"].casefold(),
                  )
                  existing = records.get(license_number)
                  if existing is None:
                      candidate["selection_key"] = candidate_key
                      records[license_number] = candidate
                  else:
                      duplicate_rows += 1
                      if existing["name"] != name:
                          conflicts.append({
                              "license_number": license_number,
                              "existing_name": existing["name"],
                              "new_name": name,
                              "existing_description": existing["description"],
                              "new_description": description,
                              "existing_lastmodifieddate": existing["lastmodifieddate"],
                              "new_lastmodifieddate": candidate["lastmodifieddate"],
                          })
                      if candidate_key > existing["selection_key"]:
                          candidate["selection_key"] = candidate_key
                          records[license_number] = candidate
              offset += len(page)
              if len(page) < page_size:
                  break

          rows = sorted(records.values(), key=lambda r: (r["name"].casefold(), r["license_number"]))
          accepted_code_counts = Counter(row["code"] for row in rows)
          accepted_description_counts = Counter(row["description"] for row in rows)

          if not (55000 <= len(rows) <= 80000):
              raise RuntimeError(f"Illinois accepted row count failed sanity range: {len(rows)}")
          minimums = {"471": 10000, "472": 50, "473": 1500, "475": 45000}
          for code, minimum in minimums.items():
              if accepted_code_counts[code] < minimum:
                  raise RuntimeError(
                      f"Illinois code {code} count {accepted_code_counts[code]} is below sanity minimum {minimum}"
                  )

          output = Path("illinois_real_estate_agents_official.csv")
          with output.open("w", encoding="utf-8", newline="") as handle:
              writer = csv.DictWriter(handle, fieldnames=FIELDS)
              writer.writeheader()
              for row in rows:
                  writer.writerow({field: row[field] for field in FIELDS})

          with output.open("rb") as handle:
              sha256 = hashlib.file_digest(handle, "sha256").hexdigest()

          report = {
              "source_provider": "Illinois Department of Financial and Professional Regulation (IDFPR)",
              "source_dataset": "Professional Licensing",
              "source_dataset_id": DATASET_ID,
              "source_page": SOURCE_PAGE,
              "retrieved_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "source_query": {
                  "license_type": "REAL ESTATE",
                  "license_status": "ACTIVE",
                  "business": "N",
              },
              "included_license_codes": TARGET_CODES,
              "raw_active_individual_real_estate_rows": raw_rows,
              "accepted_unique_license_rows": len(rows),
              "accepted_code_counts": dict(sorted(accepted_code_counts.items())),
              "accepted_description_counts": dict(sorted(accepted_description_counts.items())),
              "may_1_2026_idfpr_active_report_counts": MAY_1_2026_ACTIVE_COUNTS,
              "difference_from_may_1_report": {
                  code: accepted_code_counts[code] - expected
                  for code, expected in MAY_1_2026_ACTIVE_COUNTS.items()
              },
              "duplicate_source_rows": duplicate_rows,
              "duplicate_name_conflicts": len(conflicts),
              "invalid_license_rows_excluded": invalid_license_rows,
              "blank_name_rows_excluded": blank_name_rows,
              "excluded_code_counts": dict(sorted(excluded_code_counts.items())),
              "raw_description_counts": dict(sorted(raw_description_counts.items())),
              "output_sha256": sha256,
              "normalization": {
                  "license_number": "Official nine-digit IDFPR value preserved; uniqueness is (state, license_number)",
                  "name": "first_name + middle + last_name + suffix, with Unicode NFKC and whitespace cleanup",
                  "image_url": "Blank because the official IDFPR dataset does not publish headshots",
                  "permit_policy": "Active 472 Residential Leasing Agent Permit holders included because Illinois permits them to perform residential leasing activity for up to 120 days",
              },
          }
          Path("illinois_real_estate_agents_report.json").write_text(
              json.dumps(report, indent=2, ensure_ascii=False) + "\n", encoding="utf-8"
          )
          with Path("illinois_real_estate_agents_conflicts.csv").open(
              "w", encoding="utf-8", newline=""
          ) as handle:
              fieldnames = [
                  "license_number", "existing_name", "new_name",
                  "existing_description", "new_description",
                  "existing_lastmodifieddate", "new_lastmodifieddate",
              ]
              writer = csv.DictWriter(handle, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(conflicts)

          print(json.dumps(report, indent=2))
          PY
          python /tmp/build_il.py

      - name: Upload normalized CSV and validation report
        uses: actions/upload-artifact@v4
        with:
          name: illinois-real-estate-agents-official
          path: |
            illinois_real_estate_agents_official.csv
            illinois_real_estate_agents_report.json
            illinois_real_estate_agents_conflicts.csv
          if-no-files-found: error
          retention-days: 1
