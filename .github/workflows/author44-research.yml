name: Author 44 Club Research

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-author-dataset:
    if: github.head_ref == 'research/author-44-club-20260625' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install research dependencies
        run: python -m pip install --upgrade pip pandas requests
      - name: Build reproducible dataset
        run: python research/author44/run_fixed.py
      - name: Upload research outputs
        uses: actions/upload-artifact@v4
        with:
          name: author-44-club-research
          path: research/author44/output/
          if-no-files-found: error
          retention-days: 7
